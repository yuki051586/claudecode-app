name: Update live news

on:
  schedule:
    # Every hour on the hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-live-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch feeds and write data/live-news.json
        run: node scripts/update-news.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/live-news.json; then
            echo "No changes to data/live-news.json"
            exit 0
          fi
          git add data/live-news.json
          git commit -m "chore(data): refresh live-news.json [skip ci]"
          git push
