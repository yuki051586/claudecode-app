name: Update live news

on:
  schedule:
    # Every hour on the hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-live-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch feeds and write data/live-news.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-news.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/live-news.json
          [ -f data/impl-cache.json ] && git add -- data/impl-cache.json || true
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "chore(data): refresh live-news.json [skip ci]"
          # The repo also receives hand-written commits, so another push
          # may have landed while this run was fetching feeds. Rebase
          # onto origin/main before pushing, and retry a few times in
          # case a second push races us during the rebase window.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              exit 0
            fi
            echo "push attempt $attempt failed — refetching and retrying"
            sleep 3
          done
          echo "push failed after 3 attempts" >&2
          exit 1
